<!DOCTYPE html>
<html>
    <head>userlogin</head>
    <body>
        <form>
            <table border="1">
                <caption>USER LOGIN</caption>
                <tr>
                    <td>
                        <label for="name">Username:</label>
                    </td>
                    <td>
                        <input type="text" id="name">
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="pass">Password:</label>
                    </td>
                    <td>
                        <input type="password" id="pass">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <button>Login</button>
                    </td>
                </tr>
            </table>
        </form>

    </body>
</html>
