<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>

<body style="background-color: lightblue;">

    <h1 style="text-align: center;">College Admission Registration</h1>

    <form>
        <table border="4" cellpadding="5"
               style="margin: auto; text-align: left; border: 3px solid black;">

            <tr>
                <td><label for="fname">Full Name:</label></td>
                <td><input type="text" id="fname" name="fname"></td>
            </tr>

            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>

            <tr>
                <td><label for="phonenumber">Phone Number:</label></td>
                <td><input type="tel" id="phonenumber" name="phonenumber"></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                    <input type="radio" name="gender" value="other"> Other
                </td>
            </tr>

            <tr>
                <td><label for="course">Course Applying For:</label></td>
                <td>
                    <select id="course" name="course">
                        <option>B.Tech</option>
                        <option>MBA</option>
                        <option>B.Com</option>
                        <option>M.Sc</option>
                        <option>B.Sc</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Hobbies:</td>
                <td>
                    <input type="checkbox" name="hobby" value="sports"> Sports
                    <input type="checkbox" name="hobby" value="music"> Music
                    <input type="checkbox" name="hobby" value="reading"> Reading
                </td>
            </tr>

            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td><input type="date" id="dob" name="dob"></td>
            </tr>

            <tr>
                <td><label for="file">Upload Certificates:</label></td>
                <td><input type="file" id="file" name="file"></td>
            </tr>

            <tr>
                <td><label for="address">Address:</label></td>
                <td><textarea id="address" rows="4" cols="30"></textarea></td>
            </tr>

            <tr>
                <td colspan="2" style="text-align: center;">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
