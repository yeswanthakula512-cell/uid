<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moving Rotating Circle</title>

    <style>
        /* Body Styling */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: azure;
            font-family: Arial, sans-serif;
        }

        /* Container */
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Heading */
        h1 {
            font-size: 32px;
            margin: 0;
        }

        /* Paragraph */
        p {
            font-size: 18px;
            margin: 0;
        }

        /* Circle */
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: black;
            position: relative;

            /* Animation */
            animation: moveRotate 4s linear infinite;
        }

        /* Keyframes */
        @keyframes moveRotate {
            0% {
                left: 0;
                transform: rotate(0deg);
            }

            50% {
                left: 300px;
                transform: rotate(180deg);
            }

            100% {
                left: 0;
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1><i>Moving Rotating Circle</i></h1>
        <p>This animation combines translation and rotation using CSS</p>
        <div class="circle"></div>
    </div>
</body>
</html>
