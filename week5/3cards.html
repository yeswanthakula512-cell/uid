<!DOCTYPE html>
<html>
<head>
<title>Phone Cards</title>

<style>

body{
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
}

.card{
    width:220px;
    background:white;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    padding:15px;
}

.card img{
    width:100%;
    height:180px;
    border-radius:10px;
}

button{
    margin-top:10px;
    padding:8px 15px;
    border:none;
    background-color:blue;
    color:white;
    border-radius:5px;
}

</style>

</head>

<body>

<h1>Smartphone Collection</h1>

<div class="container">

<div class="card">
<img src="oneplus.jpg">
<h3>OnePlus</h3>
<p>OnePlus phones are known for fast performance and smooth OxygenOS.</p>
<button>View Details</button>
</div>

<div class="card">
<img src="samsung.webp">
<h3>Samsung</h3>
<p>Samsung offers powerful Android phones with amazing cameras.</p>
<button>View Details</button>
</div>

<div class="card">
<img src="iphone.jpg">
<h3>iPhone</h3>
<p>Apple iPhones provide premium design and powerful performance.</p>
<button>View Details</button>
</div>

</div>

</body>
</html>
